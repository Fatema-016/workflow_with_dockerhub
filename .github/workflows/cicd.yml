name: CI/CD for Dockerized Flask App

# Trigger the workflow on any push to the main branch or pull request
on:
  push: #----> Event
    branches: [ "main" ]
  pull_request: #----> Event
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # ---> jobs run on container provided by github.

    steps: 
    - name: Checkout repository code # Step1: Check out the code from the repository.
      uses: actions/checkout@v4

    - name: Set up Python # Step2 : Set up Python Environment. 
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies #Step 3: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Unit Tests with pytest
      run: |
        pip install pytest
        pytest

  build-and-publish:
    runs-on: ubuntu-latest
    needs: build-and-test 

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }} # Docker Hub username stored in GitHub Secrets
        password: ${{ secrets.DOCKERHUB_TOKEN }}    # Docker Hub Access Token stored in GitHub Secrets

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${{ github.sha }}

    - name: Image digest
      run: echo ${{ steps.build-and-publish.outputs.digest }}